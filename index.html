<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caddie">
<meta name="theme-color" content="#0a0f0d">
<title>Werner's Caddie — Old Schoolers Ryder Cup</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#080d0b;--surface:#0f1812;--surface2:#162019;--border:#1e2e22;
  --text:#d6e8d0;--muted:#5a7a60;--accent:#3dff7a;--accent-dim:#1a6632;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;touch-action:pan-y;}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 14px;}
.header-row1{display:flex;align-items:center;gap:5px;}
.ka-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;padding:6px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
.ka-btn::before{content:'●';font-size:7px;color:var(--muted);}
.ka-btn.active{border-color:var(--accent-dim);color:var(--accent);background:rgba(61,255,122,0.05);}
.ka-btn.active::before{color:var(--accent);}
.day-selector{display:flex;gap:4px;flex:1;}
.day-btn{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;padding:6px 2px;border-radius:6px;cursor:pointer;transition:all 0.2s;text-align:center;letter-spacing:0.3px;}
.day-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.day-btn.stats-btn{border-color:#b07a10;color:#f0b030;}
.day-btn.stats-btn.active{background:#2a1800;border-color:#f0b030;color:#f0b030;}
.day-btn.tips-btn{border-color:#3a1a7a;color:#a78bfa;}
.day-btn.tips-btn.active{background:#1a0d3a;border-color:#7c3aed;color:#c4b5fd;}

/* TIPS PAGE */
.tips-page{padding:10px 12px 100px;}
.tips-toggle{display:flex;gap:6px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;}
.tt-btn{flex:1;font-family:'DM Mono',monospace;font-size:10px;padding:7px 4px;border-radius:5px;cursor:pointer;text-align:center;background:none;border:none;color:var(--muted);transition:all 0.15s;}
.tt-btn.active{background:var(--accent-dim);color:var(--accent);}
.tips-tabs{display:flex;gap:4px;margin-bottom:12px;}
.tip-tab{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;padding:7px 2px;border-radius:6px;cursor:pointer;text-align:center;}
.tip-tab.active{background:#1a0d3a;border-color:#7c3aed;color:#c4b5fd;}
.tip-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.tip-cues{list-style:none;display:flex;flex-direction:column;gap:8px;}
.tip-cue{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent-dim);}
.tip-cue.key{border-left-color:var(--accent);background:rgba(61,255,122,0.05);}
.tip-cue-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent-dim);line-height:1;flex-shrink:0;width:20px;text-align:center;}
.tip-cue.key .tip-cue-num{color:var(--accent);}
.tip-cue-text{font-size:14px;color:var(--text);line-height:1.4;}
.tip-cue-text strong{color:var(--accent);font-weight:600;}
.tip-checklist{display:flex;flex-direction:column;gap:8px;}
.tip-check{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--surface2);border-radius:8px;}
.tip-check-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.tip-check-text{font-size:13.5px;color:var(--text);line-height:1.4;}
.tip-check-text strong{color:var(--accent);font-weight:600;}
.tip-divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.tip-sub-head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.traffic-row{display:flex;gap:6px;margin-bottom:10px;}
.tl-chip{flex:1;border-radius:7px;padding:8px 6px;text-align:center;}
.tl-chip.red{background:#1a0808;border:1px solid #7a2020;}
.tl-chip.amber{background:#1a1405;border:1px solid #6b5a1a;}
.tl-chip.green{background:#071a0e;border:1px solid #2a7a40;}
.tl-icon{font-size:18px;line-height:1;}
.tl-label{font-family:'DM Mono',monospace;font-size:9px;margin-top:3px;letter-spacing:0.5px;}
.tl-chip.red .tl-label{color:#f87171;}
.tl-chip.amber .tl-label{color:#f0c060;}
.tl-chip.green .tl-label{color:#4dff8a;}
.full-section{margin-bottom:14px;}
.full-section:last-child{margin-bottom:0;}
.full-section-head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.full-item{font-size:13.5px;color:var(--text);line-height:1.7;padding:8px 0;}
.full-item strong{color:var(--accent);font-weight:600;}
.full-item+.full-item{border-top:1px solid var(--border);}

/* HOLE BAR */
.hole-bar{position:fixed;top:46px;left:0;right:0;z-index:99;background:var(--bg);padding:6px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:top 0.25s ease;}
.hole-nav{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-btn{width:38px;height:38px;min-width:38px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;}
.nav-btn:active{background:var(--surface2);transform:scale(0.93);}
.hole-num-circle{width:38px;height:38px;min-width:38px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hole-num-circle .v{font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;line-height:1;}
.hole-chips{display:flex;gap:5px;flex-shrink:0;}
.h-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;text-align:center;}
.h-chip .v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);line-height:1;}
/* Match score chip */
.match-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;text-align:center;margin-left:auto;flex-shrink:0;}
.match-chip .v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1;white-space:nowrap;}
.match-chip.eu-up .v{color:#60a5fa;}
.match-chip.us-up .v{color:#f87171;}
.match-chip.square .v{color:#f0b030;}
/* Zone colours — EU blue = attack, US red = defend */
.hole-bar.attack .hole-num-circle{border-color:#1a4a7a;}
.hole-bar.attack .hole-num-circle .v{color:#60a5fa;}
.hole-bar.attack .h-chip .v{color:#60a5fa;}
.hole-bar.attack .h-chip{border-color:#1a4a7a;}
.hole-bar.contest .hole-num-circle{border-color:#b07a10;}
.hole-bar.contest .hole-num-circle .v{color:#f0b030;}
.hole-bar.contest .h-chip .v{color:#f0b030;}
.hole-bar.contest .h-chip{border-color:#b07a10;}
.hole-bar.defend .hole-num-circle{border-color:#7a2020;}
.hole-bar.defend .hole-num-circle .v{color:#f87171;}
.hole-bar.defend .h-chip .v{color:#f87171;}
.hole-bar.defend .h-chip{border-color:#7a2020;}

/* MAIN */
.main{position:fixed;top:104px;bottom:0;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.card{padding:10px 12px 100px;}
.card-wrapper{transition:transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.2s;}
.card-wrapper.slide-left{transform:translateX(-30px);opacity:0;}
.card-wrapper.slide-right{transform:translateX(30px);opacity:0;}
.section-head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}

/* Radial gauge */
.gauge-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.gauge-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.gauge-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.gauge-wrap{position:relative;display:inline-block;width:100px;height:60px;overflow:visible;}
.gauge-wrap svg{width:100px;height:60px;overflow:visible;}
.gauge-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;margin-top:4px;}
.gauge-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}

/* EU opportunity strip — horizontal stat layout */
.opp-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.opp-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;}
.opp-card.leader{border-color:var(--accent-dim);background:rgba(61,255,122,0.04);}
.opp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.opp-name{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.5px;color:var(--muted);text-transform:uppercase;}
.opp-card.leader .opp-name{color:var(--accent);}
.opp-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--muted);line-height:1;}
.opp-card.leader .opp-rank{color:var(--accent);}
.opp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.opp-stat{text-align:center;}
.opp-stat-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
.opp-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent);line-height:1;margin-top:1px;}
.opp-stat-val.muted{color:var(--muted);}
.opp-strokes-pill{font-family:'DM Mono',monospace;font-size:10px;padding:2px 5px;border-radius:4px;display:inline-block;}
.opp-strokes-pill.s2{background:#3a0a0a;color:#ff6060;}
.opp-strokes-pill.s1{background:var(--surface2);color:var(--muted);}
.opp-strokes-pill.s0{background:var(--surface2);color:#3a4a3a;}
.gir-icon{font-size:11px;margin-left:3px;opacity:0.8;}

/* Strategy boxes */
.strategy-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:12px;font-size:13.5px;line-height:1.65;color:var(--text);}
.strategy-box .hl{color:var(--accent);font-weight:600;}
.strategy-box .warn{color:#ff6060;font-weight:600;}
.strategy-box .note{color:#f0b030;font-weight:600;}
.strategy-box .divider{display:block;border-top:1px solid var(--border);margin:10px 0;}

/* Hazards + AIS side by side */
.hazard-ais-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px;align-items:start;}
.hazard-row{display:flex;flex-wrap:wrap;gap:5px;}
.hazard-tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.hazard-tag.danger{border-color:#7a2020;color:#f87171;background:#1a0808;}
.hazard-tag.water{border-color:#1a4a7a;color:#60a5fa;background:#080f1a;}
.hazard-tag.bunker{border-color:#6b5a1a;color:#f0c060;background:#1a1405;}

/* AIS button */
.ais-btn{background:#0d2218;border:1px solid var(--accent-dim);color:var(--accent);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:5px 9px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.ais-btn:active{background:var(--accent-dim);}
.ais-btn.loading{opacity:0.5;pointer-events:none;}

/* Strategy boxes — AIS indicator */
.strategy-box.ais-active{border-color:#2a7a40;background:#071a0e;}
.ais-bold{color:var(--accent);font-weight:600;}
.ais-loading{text-align:center;padding:16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}
.ais-loading::after{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-left:6px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* Stroke table */
.stroke-table{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.stroke-table table{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px;}
.stroke-table th{background:var(--surface2);color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;text-align:left;font-weight:400;}
.stroke-table td{padding:8px 10px;border-top:1px solid var(--border);color:var(--text);}
.stroke-table tr.row-eu td{background:#080f1a;border-left:2px solid #1a4a7a;}
.stroke-table tr.row-eu td:first-child{padding-left:8px;}
.stroke-table tr.row-us td{background:#1a0808;border-left:2px solid #7a2020;}
.stroke-table tr.row-us td:first-child{padding-left:8px;}
.stroke-table tr.is-werner td{background:rgba(96,165,250,0.06);}
.stroke-table tr.is-werner td:first-child{border-left:2px solid #60a5fa;padding-left:8px;}
.eu-name{color:#60a5fa;font-weight:500;}
.us-name{color:#f87171;font-weight:500;}
.sb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:500;}
.sb.s0{color:var(--muted);}
.sb.s1{background:var(--accent-dim);color:var(--accent);}
.sb.s2{background:#c0392b;color:#fff;font-weight:700;}

/* SCORE CAPTURE */
.capture-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.capture-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.capture-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.tog-row{display:flex;gap:5px;}
.tog{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:7px 4px;border-radius:6px;cursor:pointer;text-align:center;transition:all 0.15s;}
.tog.active-yes{background:#0d2a10;border-color:var(--accent);color:var(--accent);}
.tog.active-no{background:#2a0808;border-color:#ff6060;color:#ff6060;}
.tog.active-na{background:var(--surface2);border-color:var(--muted);color:var(--muted);}
.tog.disabled{opacity:0.3;pointer-events:none;}
/* Hole result toggles — blue EU, amber draw, red US */
.tog.active-eu{background:#080f1a;border-color:#1a4a7a;color:#60a5fa;}
.tog.active-draw{background:#1a1405;border-color:#6b5a1a;color:#f0c060;}
.tog.active-us{background:#1a0808;border-color:#7a2020;color:#f87171;}
.counter-row{display:flex;align-items:center;gap:8px;}
.cnt-btn{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;}
.cnt-btn:active{background:var(--border);}
.cnt-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;flex:1;text-align:center;}
.cnt-val.at-default{color:var(--muted);}
.capture-card.full{grid-column:1/-1;}
.saved-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-dim);margin-left:6px;vertical-align:middle;transition:background 0.3s;}
.saved-dot.saved{background:var(--accent);}

/* STATS PAGE */
.stats-page{padding:12px 14px 100px;}
.stats-filter{display:flex;gap:5px;margin-bottom:14px;}
.sf-btn{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;padding:7px 4px;border-radius:6px;cursor:pointer;text-align:center;}
.sf-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;text-align:center;}
.kpi-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1;color:var(--accent);}
.kpi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;}
.kpi-bar-bg{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);}
.kpi-bar-fill{height:100%;background:var(--accent);transition:width 0.4s;}
/* Net score hero card */
.net-score-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;text-align:center;}
.net-score-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.net-score-val{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px;line-height:1;}
.net-score-val.under{color:#4dff8a;}
.net-score-val.over{color:#f87171;}
.net-score-val.even{color:var(--muted);}
.net-score-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}
.dist-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.dist-head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.dist-bars{display:flex;align-items:flex-end;gap:6px;height:60px;margin-bottom:6px;}
.dist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.dist-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height 0.4s;}
.dist-bar.bird{background:#4dff8a;}
.dist-bar.par{background:#5a7a60;}
.dist-bar.bog{background:#f0b030;}
.dist-bar.dbl{background:#ff6060;}
.dist-bar.trip{background:#c03030;}
.dist-count{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);}
.dist-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.5px;}
.par-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.par-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.par-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.par-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1;}
.par-diff{font-family:'DM Mono',monospace;font-size:10px;margin-top:3px;}
.par-diff.over{color:#f0b030;}
.par-diff.under{color:#4dff8a;}
.par-diff.even{color:var(--muted);}
.misc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.misc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.misc-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.misc-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1;}
.no-data{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;padding:30px;letter-spacing:0.5px;}

.swipe-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);opacity:0.5;pointer-events:none;white-space:nowrap;}
.install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:200;transform:translateY(100%);transition:transform 0.3s;}

const GIR_TARGET=new Set(HOLES.filter(h=>[13,14,15,16,17,18].includes(h.si)).map(h=>h.num));
const DAY_FORMAT={1:'American Scramble Drive (both tee off, best drive selected, each plays own ball from there — better Stableford score counts for EU)',2:'2-Ball Better Ball Stableford (each plays own ball throughout, better net Stableford score per hole counts for EU)',3:'Singles Stableford (individual net Stableford, target 36+ points)'};

// ── RANKS ──────────────────────────────────────────────────────────────────────
function buildRanks(p){
  const t2=HOLES.filter(h=>h[p]===2).sort((a,b)=>b.si-a.si);
  const t1=HOLES.filter(h=>h[p]===1).sort((a,b)=>b.si-a.si);
  const t0=HOLES.filter(h=>h[p]===0).sort((a,b)=>b.si-a.si);
  const m={};[...t2,...t1,...t0].forEach((h,i)=>{m[h.num]=i+1;});return m;
}
const R={w:buildRanks('werner'),d:buildRanks('deon'),c:buildRanks('cilliers'),x:buildRanks('christo')};

// ── ZONES ──────────────────────────────────────────────────────────────────────
const ZD=(()=>{
  const zm={},em={},um={};
  HOLES.forEach(h=>{
    const eu=R.w[h.num]+R.d[h.num],us=R.c[h.num]+R.x[h.num];
    // Binary: EU advantage (diff>0) = attack, US advantage (diff<0) = defend, equal = contest
    zm[h.num]=us>eu?'attack':eu>us?'defend':'contest';
    em[h.num]=eu;um[h.num]=us;
  });
  return{zm,em,um};
})();

// ── STATIC STRATEGY HELPERS ────────────────────────────────────────────────────
function teeChar(num){return{1:'tight',2:'tight',4:'tight',5:'tight',6:'tight',8:'tight',9:'open',10:'tight',12:'open',13:'tight',15:'tight',16:'tight',17:'carry',18:'tight'}[num]||'open';}
function teeStrat(h,leader){
  const tc=teeChar(h.num),si=h.si;
  if(tc==='carry') return `<span class="note">Tee — committed carry required.</span> Both players commit to the carry. ${leader==='deon'?'Deon':'Werner'} takes the aggressive line to the green.`;
  if(tc==='open')  return `<span class="hl">Tee — both go big.</span> Wide fairway with room either side. Both hit driver freely.`;
  if(si>=10) return leader==='deon'
    ?`<span class="note">Tee — Deon anchors, Werner attacks.</span> SI ${si} easier hole but tight off the tee. Deon secures the fairway first with iron/hybrid. Werner can then swing freely.`
    :`<span class="note">Tee — Werner anchors, Deon attacks.</span> SI ${si} — easier hole but accuracy matters. Werner hits iron/hybrid first to secure position. Deon then attacks.`;
  return `<span class="warn">Tee — both play controlled.</span> SI ${si} is a tough hole — accuracy over distance. Both hit iron or hybrid.`;
}
function par3Strat(h,zone){
  const wS=h.werner,dS=h.deon,cS=h.cilliers,xS=h.christo;
  const intent=zone==='attack'?'EU has the advantage — target at least 3 points between Werner and Deon.'
    :zone==='contest'?'Contested — EU needs at least 2 points to stay level.'
    :'US has the advantage — EU needs at least 3 points to block their scoring.';
  let pin='';
  if(wS>0&&dS===0)    pin=`<span class="hl">Werner has the stroke — Werner attacks the pin.</span> Deon plays safe to the centre of the green.`;
  else if(dS>0&&wS===0) pin=`<span class="note">Deon has the stroke — Deon attacks the pin.</span> Werner plays safe to the centre of the green as insurance.`;
  else if(wS>0&&dS>0) pin=`<span class="hl">Both stroke here — both can attack.</span> Better-ranked player takes the aggressive line; other plays centre-green as backup.`;
  else                pin=`Neither player strokes — both play safe to the fat of the green. Two-putt par is the goal.`;
  let threat='';
  if(xS===2) threat+=` <span class="warn">Christo doubles here.</span>`;
  if(cS===0) threat+=` <span class="hl">Cilliers no stroke — EU relative edge.</span>`;
  return `${intent}<span class="divider"></span>${pin}${threat}`;
}
function scrambleApproach(h){
  const wR=R.w[h.num],dR=R.d[h.num];
  const leader=wR<dR?'werner':dR<wR?'deon':'equal';
  let resp=leader==='werner'
    ?`<span class="hl">Werner takes the aggressive line to the green</span> to chase the birdie. Deon plays solid and conservative.`
    :leader==='deon'
    ?`<span class="note">Deon takes the aggressive line to the green</span> to chase the birdie. Werner plays solid and conservative.`
    :`Werner and Deon equally ranked — both play their own lines, best approach counts.`;
  let threat='';
  if(h.christo===2&&h.werner===2) threat=` <span class="warn">Both Werner and Christo double — direct scoring battle. Solid ball-striking to block Christo.</span>`;
  else if(h.christo===2) threat=` <span class="warn">Christo doubles here — EU must convert to block.</span>`;
  if(h.cilliers===0) threat+=` <span class="hl">Cilliers no stroke — EU edge over him.</span>`;
  return resp+threat;
}
function getStaticStrategy(h,day){
  const zone=ZD.zm[h.num],wR=R.w[h.num],dR=R.d[h.num];
  const leader=wR<dR?'werner':dR<wR?'deon':'equal';
  if(day===1){
    if(h.par===3)return{tee:null,approach:par3Strat(h,zone)};
    return{tee:teeStrat(h,leader),approach:scrambleApproach(h)};
  }
  const zNote=zone==='attack'?'Priority hole — commit to getting your net score.'
    :zone==='defend'?'US-favoured hole. Bogey is a solid result.'
    :'Steady play, take what the hole gives.';
  let txt=`<span class="hl">Werner's scoring rank: #${wR} of 18.</span> ${zNote}`;
  if(h.christo===2) txt+=` <span class="warn">Christo doubles here.</span>`;
  if(h.cilliers===0) txt+=` <span class="hl">Cilliers no stroke — EU edge.</span>`;
  return{tee:null,approach:txt};
}

// ── MATCH SCORE ────────────────────────────────────────────────────────────────
// Stored per day as array of 18 hole results: 'eu'|'draw'|'us'|null
function matchKey(day){return `match_d${day}`;}
function loadMatch(day){
  try{const r=localStorage.getItem(matchKey(day));return r?JSON.parse(r):Array(18).fill(null);}
  catch(e){return Array(18).fill(null);}
}
function saveMatch(day,arr){try{localStorage.setItem(matchKey(day),JSON.stringify(arr));}catch(e){}}

function calcMatchScore(day,upToHole){
  const results=loadMatch(day);
  let eu=0,us=0;
  for(let i=0;i<upToHole;i++){
    if(results[i]==='eu')eu++;
    else if(results[i]==='us')us++;
  }
  const diff=eu-us;
  const holesRemaining=18-upToHole;
  if(diff===0)return{label:'A/S',cls:'square',diff:0,holesRemaining};
  if(diff>0)return{label:`${diff} UP`,cls:'eu-up',diff,holesRemaining};
  return{label:`${Math.abs(diff)} DN`,cls:'us-up',diff,holesRemaining};
}


function updateMatchResult(day,holeIdx,result){
  const arr=loadMatch(day);
  arr[holeIdx]=arr[holeIdx]===result?null:result;
  saveMatch(day,arr);
  const h=HOLES[currentHole];
  const container=document.getElementById(`capture_${h.num}`);
  if(container)container.innerHTML=renderCapture(h,day);
  // Recalculate from scratch and update chip immediately
  const ms=calcMatchScore(day,18);
  const el=document.getElementById('matchChip');
  if(el){
    // Show running score up to and including this hole
    const running=calcMatchScore(day,holeIdx+1);
    el.innerHTML=`<div class="match-chip ${running.cls}"><div class="v">${running.label}</div></div>`;
  }
}

function renderMatchChip(){
  const ms=calcMatchScore(currentDay,currentHole+1);
  const el=document.getElementById('matchChip');
  if(!el)return;
  el.innerHTML=`<div class="match-chip ${ms.cls}"><div class="v">${ms.label}</div></div>`;
}

// ── AIS (AI STRATEGY) ─────────────────────────────────────────────────────────
// Persisted per day+hole: {text, generated_at}
const aisCache={};
function aisKey(day,holeNum){return `ais_d${day}_h${holeNum}`;}
function loadAIS(day,holeNum){
  if(aisCache[aisKey(day,holeNum)])return aisCache[aisKey(day,holeNum)];
  try{const r=localStorage.getItem(aisKey(day,holeNum));if(r){const p=JSON.parse(r);aisCache[aisKey(day,holeNum)]=p;return p;}}
  catch(e){}
  return null;
}
function saveAIS(day,holeNum,data){
  aisCache[aisKey(day,holeNum)]=data;
  try{localStorage.setItem(aisKey(day,holeNum),JSON.stringify(data));}catch(e){}
}
function clearAIS(day,holeNum){
  delete aisCache[aisKey(day,holeNum)];
  try{localStorage.removeItem(aisKey(day,holeNum));}catch(e){}
}

async function generateAIS(holeNum,day){
  const h=HOLES[holeNum-1];
  const zone=ZD.zm[h.num];
  const ms=calcMatchScore(day,currentHole);
  const wNP=h.par+h.werner;
  const isGIRTarget=GIR_TARGET.has(h.num);

  const systemPrompt=`You are a golf caddie speaking directly to Werner (use "you/your"). Be direct and tactical. No explanations of rules or scoring — Werner knows Stableford. Never mention par numbers, SI, distance, net/gross, stroke index, point values, or handicap numbers. Just say "par", "birdie", "bogey" as targets.

Never mention or reference: the match score or standing, player ranking numbers, Deon's rank, picking the best drive, or picking the best score. Werner already sees all of that on screen before reading your advice.

DAY 1 FORMAT — AMERICAN SCRAMBLE DRIVE: Both Werner and Deon tee off every hole. They pick the best drive, then EACH plays their own ball from that spot. The better Stableford score counts for EU. Use the two-ball advantage tactically — the player with the better scoring rank attacks the pin; the other plays percentage as insurance.

WERNER: Driver ~260m but inconsistent — misses both sides. Deon: HCI 8, very consistent, ~260m.
MATCH CONTEXT: Adjust aggression based on match score and holes remaining. Down = attack. Up = manage. Do NOT state the score — let it shape the advice tone and targets only.

CRITICAL: Always incorporate the specific layout warnings from the official course notes (e.g. don't miss left, carry the bunker, avoid the dam).

FORMAT: Use **double asterisks** around critical warnings or key actions only (max 2 per field).

STRICT CHARACTER LIMITS:
- "tee": max 180 chars (omit key entirely if not Day 1 or no drive selection needed)
- "strategy": max 320 chars

Return JSON only, no markdown wrapper, no preamble.`;

  const userMsg=`Hole ${h.num} — ${h.name}
Zone: ${ZD.zm[h.num].toUpperCase()} (EU ${ZD.em[h.num]} vs US ${ZD.um[h.num]})
Werner: ${h.werner} stroke(s)${isGIRTarget?' — GIR TARGET':''}
Deon: ${h.deon} | Cilliers: ${h.cilliers} | Christo: ${h.christo}${h.christo===2?' (DOUBLES)':''}
Scoring ranks — Werner #${R.w[h.num]}, Deon #${R.d[h.num]}, Cilliers #${R.c[h.num]}, Christo #${R.x[h.num]}
Match: ${ms.label} with ${ms.holesRemaining} holes remaining (Day ${day} — ${DAY_FORMAT[day].split('(')[0].trim()})
Official course notes: ${h.notes}`;

  // Show loading state in boxes
  const teeBox=document.getElementById('stratTeeBox');
  const mainBox=document.getElementById('stratMainBox');
  if(teeBox&&h.par>3&&day===1) teeBox.innerHTML=`<div class="ais-loading">Thinking</div>`;
  if(mainBox) mainBox.innerHTML=`<div class="ais-loading">Thinking</div>`;

  // Disable button
  const btn=document.getElementById('aisBtnEl');
  if(btn){btn.classList.add('loading');btn.textContent='⚡ AIS...';}

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:[{role:'user',content:userMsg}]
      })
    });
    const data=await resp.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'{}';
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    saveAIS(day,holeNum,{...parsed,ts:Date.now()});
    applyStrategyContent(h,day,parsed);
  }catch(e){
    if(mainBox) mainBox.innerHTML='<span class="warn">Failed — check connection</span>';
  }finally{
    if(btn){btn.classList.remove('loading');btn.textContent='⚡ AIS';}
  }
}

function parseBold(text){
  // Convert **text** to styled span
  return text.replace(/\*\*(.+?)\*\*/g,'<span class="ais-bold">$1</span>');
}

function applyStrategyContent(h,day,aisData){
  const teeBox=document.getElementById('stratTeeBox');
  const mainBox=document.getElementById('stratMainBox');
  const isAIS=aisData!=null;
  const strat=isAIS?null:getStaticStrategy(h,day);

  if(teeBox){
    if(h.par>3&&day===1){
      const teeText=isAIS?parseBold(aisData.tee||''):(strat.tee||'');
      teeBox.className='strategy-box'+(isAIS?' ais-active':'');
      teeBox.innerHTML=teeText;
      teeBox.style.display='block';
    } else {
      teeBox.style.display='none';
    }
  }
  if(mainBox){
    const mainText=isAIS?parseBold(aisData.strategy||''):(h.desc+(strat&&strat.approach?'<span class="divider"></span>'+strat.approach:''));
    mainBox.className='strategy-box'+(isAIS?' ais-active':'');
    mainBox.innerHTML=mainText;
  }
}

function triggerAIS(holeNum,day){
  clearAIS(day,holeNum);
  generateAIS(holeNum,day);
}

// ── SCORE DATA ─────────────────────────────────────────────────────────────────
function scoreKey(day,holeNum){return `d${day}_h${holeNum}`;}
function loadScore(day,holeNum){try{const r=localStorage.getItem(scoreKey(day,holeNum));return r?JSON.parse(r):null;}catch(e){return null;}}
function saveScore(day,holeNum,data){try{localStorage.setItem(scoreKey(day,holeNum),JSON.stringify(data));}catch(e){}}
function defaultScore(h){return{fir:null,gir:null,putts:2,ud:'na',penalty:0,score:h.par+h.werner,result:null};}

function captureToggle(holeNum,field,val){
  const h=HOLES[holeNum-1];
  const s=loadScore(currentDay,holeNum)||defaultScore(h);
  s[field]=s[field]===val?null:val;
  if(field==='gir'&&s.gir===true)s.ud='na';
  saveScore(currentDay,holeNum,s);
  refreshCapture(h);
}
function captureUD(holeNum,val){
  const h=HOLES[holeNum-1];
  const s=loadScore(currentDay,holeNum)||defaultScore(h);
  if(s.gir===true)return;
  s.ud=s.ud===val?'na':val;
  saveScore(currentDay,holeNum,s);
  refreshCapture(h);
}
function captureCounter(holeNum,field,delta){
  const h=HOLES[holeNum-1];
  const s=loadScore(currentDay,holeNum)||defaultScore(h);
  const mins={putts:0,penalty:0,score:1};
  s[field]=Math.max(mins[field],(s[field]||0)+delta);
  saveScore(currentDay,holeNum,s);
  if(field==='score'){
    const v=document.getElementById(`scoreVal${holeNum}`);
    if(v){v.textContent=s.score;v.className='cnt-val'+(s.score===(h.par+h.werner)?' at-default':'');}
    const dot=document.getElementById(`savedDot${holeNum}`);
    if(dot)dot.classList.add('saved');
  } else {
    refreshCapture(h);
  }
}
function refreshCapture(h){
  const c=document.getElementById(`capture_${h.num}`);
  if(c)c.innerHTML=renderCapture(h,currentDay);
}

// Pre-built Werner strokes per hole for stats calculations
const WERNER_STROKES=Object.fromEntries(HOLES.map(h=>[h.num,h.werner]));

// ── STATS ──────────────────────────────────────────────────────────────────────
function calcStats(days){
  const res={firMade:0,firTotal:0,girMade:0,girTotal:0,puttsTotal:0,puttsHoles:0,threeputts:0,udMade:0,udTotal:0,penaltyTotal:0,scoreByPar:{3:[],4:[],5:[]},birdies:0,pars:0,bogeys:0,doubles:0,triples:0,holesPlayed:0,matchWon:0,matchDraw:0,matchLost:0,matchPlayed:0,totalGross:0,totalNetPar:0};
  days.forEach(day=>{
    const matchArr=loadMatch(day);
    matchArr.forEach(r=>{
      if(!r)return;
      res.matchPlayed++;
      if(r==='eu')res.matchWon++;
      else if(r==='draw')res.matchDraw++;
      else if(r==='us')res.matchLost++;
    });
    HOLES.forEach(h=>{
      const s=loadScore(day,h.num);
      if(!s)return;
      res.holesPlayed++;
      if(h.par>3){res.firTotal++;if(s.fir===true)res.firMade++;}
      res.girTotal++;if(s.gir===true)res.girMade++;
      if(s.putts!=null){res.puttsTotal+=s.putts;res.puttsHoles++;if(s.putts>=3)res.threeputts++;}
      if(s.ud==='yes'||s.ud==='no'){res.udTotal++;if(s.ud==='yes')res.udMade++;}
      res.penaltyTotal+=s.penalty||0;
      const gross=s.score,diff=gross-h.par;
      res.totalGross+=gross;
      res.totalNetPar+=(h.par+WERNER_STROKES[h.num]);
      res.scoreByPar[h.par].push(gross);
      if(diff<=-1)res.birdies++;
      else if(diff===0)res.pars++;
      else if(diff===1)res.bogeys++;
      else if(diff===2)res.doubles++;
      else if(diff>=3)res.triples++;
    });
  });
  return res;
}

          // SVG arc — semicircle, 180 deg sweep
          const r=40,cx=50,cy=50;
          const circumference=Math.PI*r; // half circle arc length
          function arcEnd(p){
            const angle=-180+(p/100)*180;
            const rad=angle*Math.PI/180;
            return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
          }
          const dashTotal=circumference;
          const dashFill=(pctC/100)*circumference;
          const dashGap=circumference-dashFill;
          const tgtAngle=-180+(tgtC/100)*180;
          const tgtRad=tgtAngle*Math.PI/180;
          const tgtX=cx+r*Math.cos(tgtRad),tgtY=cy+r*Math.sin(tgtRad);
          const tgtXi=cx+(r-8)*Math.cos(tgtRad),tgtYi=cy+(r-8)*Math.sin(tgtRad);

          return `<div class="gauge-card">

            </div>
            <div class="gauge-pct" style="color:${color}">${pct}%</div>
            <div class="gauge-sub">${made}/${total} · tgt ${targetPct}%</div>
          </div>`;
        }
        return gauge(firPct,'FIR',st.firMade,st.firTotal,36,25,45)+

function renderStage(stageData, mode){
  const items = mode==='quick' ? stageData.quick : stageData.full;
  if(!items) return '';
  return items.map(item=>`<div class="full-item">${item}</div>`).join('');
}

function renderTips(){
  showingTips=true;
  showingStats=false;
  document.getElementById('holeBar').style.display='none';
  document.getElementById('swipeHint').style.display='none';
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.day-btn')[4].classList.add('active');

  const tip=TIPS[tipsTab];

  // Core stages always shown
  const coreStages=[
    {key:'assessment', label:'Assessment'},
    {key:'rehearsal',  label:'Rehearsal'},
    {key:'setup',      label:'Setup'},
    {key:'swing',      label:'Swing'}
  ];
  // Extra stages — full mode only
  const extraStages=[
    {key:'foundations', label:'Foundations'},
    {key:'drills',      label:'Drills'}
  ];

  // Traffic light block for chip/bunker assessment
  const trafficLight=`
    <div class="traffic-row" style="margin-top:10px">
      <div class="tl-chip red"><div class="tl-icon">🔴</div><div class="tl-label">Hard pan<br>R1 only</div></div>
      <div class="tl-chip amber"><div class="tl-icon">🟡</div><div class="tl-label">Tight lie<br>R1 or R2</div></div>
      <div class="tl-chip green"><div class="tl-icon">🟢</div><div class="tl-label">Sits up<br>Any release</div></div>
    </div>`;

  let content='';

  // In full mode, show foundations first if available
  if(tipsMode==='full'){
    extraStages.filter(s=>s.key==='foundations').forEach(s=>{
      const stageData=tip.stages[s.key];
      if(!stageData||!stageData.full) return;
      content+=`<div class="full-section">
        <div class="full-section-head">${s.label}</div>
        ${renderStage(stageData, 'full')}
      </div>`;
    });
  }

  // Core stages
  coreStages.forEach(s=>{
    const stageData=tip.stages[s.key];
    if(!stageData) return;
    const rendered=renderStage(stageData, tipsMode);
    if(!rendered) return;
    content+=`<div class="full-section">
      <div class="full-section-head">${s.label}</div>
      ${rendered}
      ${(s.key==='assessment'&&(tipsTab==='chip'||tipsTab==='bunker'))?trafficLight:''}
    </div>`;
  });

  // In full mode, show drills last if available
  if(tipsMode==='full'){
    extraStages.filter(s=>s.key==='drills').forEach(s=>{
      const stageData=tip.stages[s.key];
      if(!stageData||!stageData.full) return;
      content+=`<div class="full-section">
        <div class="full-section-head">${s.label}</div>
        ${renderStage(stageData, 'full')}
      </div>`;
    });
  }

  document.getElementById('holeCard').innerHTML=`
  <div class="tips-page">
    <div class="tips-toggle">
      <button class="tt-btn ${tipsMode==='quick'?'active':''}" onclick="setTipsMode('quick')">⚡ Quick</button>
      <button class="tt-btn ${tipsMode==='full'?'active':''}" onclick="setTipsMode('full')">📖 Full</button>
    </div>
    <div class="tips-tabs">
      ${Object.entries(TIPS).map(([k,v])=>`<button class="tip-tab ${tipsTab===k?'active':''}" onclick="setTipsTab('${k}')">${v.label}</button>`).join('')}
    </div>
    <div class="tip-card">${content}</div>
  </div>`;

  document.getElementById('mainScroll').scrollTop=0;
}

function setTipsMode(m){tipsMode=m;renderTips();}
function setTipsTab(t){tipsTab=t;renderTips();}

function showTips(){
  showingTips=true;
  renderTips();
}

  document.getElementById('holeCard').innerHTML=`<div class="card">

    <div class="section-head">Players</div>
    <div class="stroke-table">
      <table>
        <thead><tr><th>Player</th><th style="text-align:center">Rank</th><th style="text-align:center">Str</th><th style="text-align:center">NP</th><th style="text-align:center">TS</th></tr></thead>
        <tbody>
          ${(()=>{
            const euEdge=R.w[h.num]<=R.d[h.num]?'werner':'deon';
            const usEdge=R.c[h.num]<=R.x[h.num]?'cilliers':'christo';
            const players=[
              {key:'werner', name:'Werner',hci:21,rank:R.w[h.num],strokes:h.werner,np:wNP,ts:wTS,team:'eu'},
              {key:'deon',   name:'Deon',  hci:8, rank:R.d[h.num],strokes:h.deon,  np:dNP,ts:dTS,team:'eu'},
              {key:'cilliers',name:'Cilliers',hci:16,rank:R.c[h.num],strokes:h.cilliers,np:h.par+h.cilliers,ts:null,team:'us'},
              {key:'christo', name:'Christo', hci:22,rank:R.x[h.num],strokes:h.christo, np:h.par+h.christo, ts:null,team:'us'},
            ].sort((a,b)=>a.rank-b.rank);
            return players.map(p=>{
              const isWerner=p.key==='werner';
              const hasEdge=(p.key===euEdge&&p.team==='eu')||(p.key===usEdge&&p.team==='us');
              const girMark=isWerner&&isGIRTarget?' ⛳':'';
              const edgeMark=hasEdge?' ★':'';
              const rowCls=isWerner?'row-eu is-werner':'row-'+p.team;
              const nameCls=p.team==='eu'?'eu-name':'us-name';
              const tsCell=p.ts!==null?`<span style="color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:16px">${p.ts}</span>`:`<span style="color:var(--muted)">—</span>`;
              return `<tr class="${rowCls}">
                <td class="${nameCls}">${p.name}${edgeMark}${girMark}</td>
                <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center">#${p.rank}</td>
                <td style="text-align:center"><span class="sb s${p.strokes}">${p.strokes}</span></td>
                <td style="color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:center">${p.np}</td>
                <td style="text-align:center">${tsCell}</td>
              </tr>`;
            }).join('');
          })()}
        </tbody>
      </table>
    </div>

    <div class="section-head">Hazards</div>
    <div class="hazard-ais-row">
      <div class="hazard-row">
        ${h.tags.map(t=>`<span class="hazard-tag ${t.c}">${t.t}</span>`).join('')}
      </div>
      <button class="ais-btn" id="aisBtnEl" onclick="triggerAIS(${h.num},${currentDay})">⚡ AIS</button>
    </div>

    ${h.par>3&&currentDay===1?`<div class="section-head">Tee Strategy</div><div class="strategy-box" id="stratTeeBox">${strat.tee||''}</div>`:`<div id="stratTeeBox" style="display:none"></div>`}

    <div class="section-head">Strategy</div>
    <div class="strategy-box" id="stratMainBox">${h.desc}<span class="divider"></span>${strat.approach}</div>

    <div class="section-head">Score Capture — Day ${currentDay}</div>
    <div id="capture_${h.num}">${renderCapture(h,currentDay)}</div>

  </div>`;

  // Apply AIS if cached, otherwise static content is already in place
  if(aisData) applyStrategyContent(h,currentDay,aisData);
  document.getElementById('mainScroll').scrollTop=0;
}

// ── NAV ────────────────────────────────────────────────────────────────────────
function goToHole(i,dir='left'){
  if(i<0||i>=HOLES.length)return;
  const w=document.getElementById('cardWrapper');
  w.classList.add(dir==='left'?'slide-left':'slide-right');
  setTimeout(()=>{
    currentHole=i;w.classList.remove('slide-left','slide-right');
    renderHole();
    if(currentHole>0)document.getElementById('swipeHint').style.opacity='0';
  },200);
}
function nextHole(){if(!showingStats)goToHole(currentHole+1,'left');}
function prevHole(){if(!showingStats)goToHole(currentHole-1,'right');}
function setDay(d){
  showingStats=false;showingTips=false;currentDay=d;
  document.querySelectorAll('.day-btn').forEach((b,i)=>b.classList.toggle('active',i+1===d));
  renderHole();
}
function showStats(){
  showingStats=true;showingTips=false;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.day-btn')[3].classList.add('active');
  document.getElementById('holeBar').style.display='none';
  document.getElementById('swipeHint').style.display='none';
  renderStats();
  document.getElementById('mainScroll').scrollTop=0;
}
function setStatsFilter(f){statsFilter=f;renderStats();}

// ── SWIPE ──────────────────────────────────────────────────────────────────────
const mainEl=document.getElementById('mainScroll');
mainEl.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
mainEl.addEventListener('touchend',e=>{
  if(showingStats||showingTips)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50){dx<0?nextHole():prevHole();}
},{passive:true});

// ── KEEP ALIVE ─────────────────────────────────────────────────────────────────
async function toggleKeepAlive(){
  const btn=document.getElementById('kaBtn');
  if(wakeLock){await wakeLock.release();wakeLock=null;btn.classList.remove('active');btn.textContent='KEEP ALIVE';}
  else{
    try{
      wakeLock=await navigator.wakeLock.request('screen');
      btn.classList.add('active');btn.textContent='SCREEN ON';
      wakeLock.addEventListener('release',()=>{btn.classList.remove('active');btn.textContent='KEEP ALIVE';wakeLock=null;});
    }catch(e){btn.textContent='NOT SUPPORTED';setTimeout(()=>{btn.textContent='KEEP ALIVE';},2000);}
  }
}
document.addEventListener('visibilitychange',async()=>{
  if(wakeLock&&document.visibilityState==='visible')try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
});

// ── PWA ────────────────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').classList.add('show');});
async function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;dismissInstall();}
function dismissInstall(){document.getElementById('installBanner').classList.remove('show');}

    {src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%230a0f0d' rx='80'/><text x='256' y='340' font-size='260' text-anchor='middle'>⛳</text></svg>",sizes:"512x512",type:"image/svg+xml"}
  ]};
document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify(mfst)],{type:'application/json'}));
